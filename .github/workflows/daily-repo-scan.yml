name: Daily Repository Scan & Analysis

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scan-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pylint flake8 bandit coverage requests

      - name: Scan repository structure
        run: python scripts/scan_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}

      - name: Analyze code quality
        run: |
          find . -name "*.py" -type f ! -path "./.git/*" ! -path "./venv/*" | head -20 | xargs pylint --exit-zero > code_quality_report.txt || true
          echo "Code Quality Analysis Complete"

      - name: Check security issues
        run: |
          find . -name "*.py" -type f ! -path "./.git/*" ! -path "./venv/*" | head -20 | xargs bandit -ll > security_report.txt 2>&1 || true

      - name: Generate improvement suggestions
        run: python scripts/generate_suggestions.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            code_quality_report.txt
            security_report.txt
            suggestions.md
