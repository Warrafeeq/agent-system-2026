name: Daily Repository Scan & Analysis

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scan-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pylint flake8 bandit coverage requests

      - name: Scan repository structure
        run: python scripts/scan_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}

      - name: Analyze code quality
        run: |
          echo "=== Code Quality Analysis ===" > code_quality_report.txt
          find . -name "*.py" -type f ! -path "./.git/*" ! -path "./venv/*" ! -path "./projects/*" | head -20 | xargs pylint --exit-zero >> code_quality_report.txt 2>&1 || echo "Analysis complete"
          echo "Code Quality Analysis Complete"

      - name: Check security issues
        run: |
          echo "=== Security Analysis ===" > security_report.txt
          find . -name "*.py" -type f ! -path "./.git/*" ! -path "./venv/*" ! -path "./projects/*" | head -20 | xargs bandit -ll >> security_report.txt 2>&1 || echo "Security scan complete"

      - name: Generate improvement suggestions
        run: python scripts/generate_suggestions.py

      - name: Create analysis summary
        run: |
          echo "# Daily Repository Analysis" > analysis_summary.md
          echo "" >> analysis_summary.md
          echo "Generated: $(date)" >> analysis_summary.md
          echo "" >> analysis_summary.md
          echo "## Repository Overview" >> analysis_summary.md
          ls -la scripts/ >> analysis_summary.md 2>&1 || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            code_quality_report.txt
            security_report.txt
            suggestions.md
            analysis_summary.md
            repo_analysis.json
